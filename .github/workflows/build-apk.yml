name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate project (root / subfolder / zip)
        id: loc
        run: |
          if [ ! -f package.json ]; then
            ZIP=$(ls *.zip 2>/dev/null | head -1 || true)
            [ -n "$ZIP" ] && echo "Unzipping $ZIP" && unzip -q "$ZIP" -d _src
          fi
          PKG=$(find . -name package.json -not -path '*/node_modules/*' | head -1)
          if [ -z "$PKG" ]; then
            echo "::error::ما لقيت package.json. ارفع ملفات المشروع أو masjidi-lite.zip للريبو."
            exit 1
          fi
          DIR=$(dirname "$PKG")
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Project dir = $DIR"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        working-directory: ${{ steps.loc.outputs.dir }}
        run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Expo prebuild
        working-directory: ${{ steps.loc.outputs.dir }}
        run: npx expo prebuild --platform android --no-install

      - name: Ensure debug keystore
        working-directory: ${{ steps.loc.outputs.dir }}
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -keystore android/app/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        working-directory: ${{ steps.loc.outputs.dir }}
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: masjidi-lite-apk
          path: ${{ steps.loc.outputs.dir }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
